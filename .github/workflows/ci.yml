name: CI - Type-check, Format & Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npx prettier --check "src/**/*.{ts,tsx,css,md}" "public/**/*.{html,js}" "*.{json,js,mjs,md,yml,yaml}" "tests/**/*.mjs" "scripts/**/*.mjs"
      - run: npm run build
        env:
          VITE_BASE_PATH: /
      - run: npx size-limit
      - run: npm run test:all

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      # 用 pages 构建（base=/compass/），与测试默认 BASE 一致
      - run: npm run build:pages
      # 启动 preview 服务器（后台），--base 需与构建 base 匹配
      - run: nohup npx vite preview --port 4173 --base /compass/ &
      - run: npx wait-on http://127.0.0.1:4173/compass/ -t 30000
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          E2E_BASE: http://127.0.0.1:4173/compass/
      - run: npm run test:axe
        env:
          AXE_BASE: http://127.0.0.1:4173/compass/
      # 以下深度/全交互/UI 测试较脆弱，先以 continue-on-error 运行，不阻塞 CI
      - run: npm run test:full
        continue-on-error: true
      - run: npm run test:deep
        continue-on-error: true
      - run: npm run test:figure
        continue-on-error: true
      - run: npm run test:share
        env:
          BASE_URL: http://127.0.0.1:4173/compass/
        continue-on-error: true
      - run: npm run test:ui
        env:
          BASE_URL: http://127.0.0.1:4173/compass/
        continue-on-error: true
