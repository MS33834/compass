<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f5efe0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />

    <title>Mirror · MindMirror · A Glass for Asking Thyself</title>
    <meta
      name="description"
      content="MindMirror — a glass for asking thyself. Answer 60 questions across a 12-dimensional trait space to find your historical counterpart across 5 domains, 151 figures, 240 items. Local-first, no server, no tracking."
    />
    <meta
      name="keywords"
      content="MindMirror, personality, historical figures, trait space, self-discovery, literati, local-first, privacy, PWA, react, typescript, vite"
    />
    <meta name="author" content="badhope" />
    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://badhope.github.io/MindMirror/" />
    <meta property="og:title" content="Mirror · MindMirror · A Glass for Asking Thyself" />
    <meta
      property="og:description"
      content="To mirror thyself in the long river of history. Answer in form, in spirit, in a parallel resonance of time."
    />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_CN" />
    <meta property="og:site_name" content="MindMirror · Mirror" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mirror · Ask Thyself" />
    <meta
      name="twitter:description"
      content="A glass for asking thyself. Local-first · private · 151 historical figures."
    />

    <meta property="og:image" content="https://badhope.github.io/MindMirror/social-preview.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta property="og:image:alt" content="Mirror · MindMirror · A Glass for Asking Thyself" />
    <meta name="twitter:image" content="https://badhope.github.io/MindMirror/social-preview.png" />
    <meta name="twitter:image:alt" content="Mirror · MindMirror · A Glass for Asking Thyself" />

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mirror" />
    <link rel="alternate" hreflang="en" href="https://badhope.github.io/MindMirror/" />
    <link rel="alternate" hreflang="zh" href="https://badhope.github.io/MindMirror/?lang=zh" />
    <link rel="alternate" hreflang="x-default" href="https://badhope.github.io/MindMirror/" />

    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- favicon 已由 <link rel="icon"> 触发加载，无需额外 preload 避免浏览器告警 -->
    <link rel="preload" href="./patterns/rice-paper.svg" as="image" type="image/svg+xml" />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow-x: hidden;
        max-width: 100vw;
      }
      body {
        background: #f5efe0;
        color: #1a1a1a;
        font-family: 'Noto Serif SC', 'STSong', '宋体', 'SimSun', serif;
        font-size: 18px;
        line-height: 1.8;
        -webkit-font-smoothing: antialiased;
        text-align: center;
      }
      #jx-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        background: #f5efe0;
        transition: opacity 400ms ease;
      }
      #jx-boot .seal {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: #a8322e;
        color: #f5efe0;
        font-family: 'Noto Serif SC', 'STXingkai', '楷体', serif;
        font-size: 40px;
        line-height: 80px;
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(168, 50, 46, 0.3);
        font-weight: 500;
      }
      #jx-boot h1 {
        margin: 0 0 16px;
        font-family: 'Noto Serif SC', 'STXingkai', '楷体', serif;
        font-weight: 500;
        font-size: 40px;
        letter-spacing: 0.4em;
      }
      #jx-boot p {
        margin: 0 0 32px;
        color: #5a5a5a;
        max-width: 480px;
        font-size: 18px;
      }
      #jx-boot .spin {
        display: inline-flex;
        gap: 12px;
        align-items: center;
        padding: 12px 24px;
        background: #ebe3cf;
        border-radius: 999px;
        font-size: 16px;
        color: #5a5a5a;
      }
      #jx-boot .dot {
        width: 14px;
        height: 14px;
        border: 2px solid #c8b88a;
        border-top-color: #a8322e;
        border-radius: 50%;
        animation: jx-spin 0.8s linear infinite;
      }
      @keyframes jx-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="jx-boot">
      <div>
        <div class="seal">镜</div>
        <h1 data-en="Mirror" data-zh="镜心">Mirror</h1>
        <p
          data-en="A glass for asking thyself. Three minutes, three millennia."
          data-zh="一面问己之镜。三分钟，三千年。"
        >
          A glass for asking thyself. Three minutes, three millennia.
        </p>
        <div class="spin">
          <span class="dot"></span> <span data-en="Loading..." data-zh="入镜中…">Loading...</span>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var lang = (navigator.language || navigator.userLanguage || 'en').slice(0, 2);
        if (lang === 'zh') {
          var h1 = document.querySelector('#jx-boot h1');
          var p = document.querySelector('#jx-boot p');
          var spin = document.querySelector('#jx-boot .spin span');
          if (h1) h1.textContent = h1.getAttribute('data-zh');
          if (p) p.textContent = p.getAttribute('data-zh');
          if (spin) spin.textContent = spin.getAttribute('data-zh');
        }
      })();
    </script>
    <div id="root"></div>
    <noscript>
      <div
        style="
          max-width: 640px;
          margin: 80px auto;
          text-align: center;
          padding: 0 20px;
          font-family: serif;
        "
      >
        <h1>Mirror needs JavaScript</h1>
        <p>
          Mirror is a local-first, all-in-the-browser tool for self-reflection. Enable JavaScript to
          enter.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => {
            console.warn('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
