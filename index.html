    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        overflow-x: visible;
        max-width: 100vw;
      }
      body {
        background: #f5efe0;
        color: #1a1a1a;
        font-family: 'Noto Serif SC', 'STSong', '宋体', 'SimSun', serif;
        font-size: 18px;
        line-height: 1.8;
        -webkit-font-smoothing: antialiased;
        text-align: center;
      }
      #cp-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        background: #f5efe0;
        transition: opacity 400ms ease;
      }
      #cp-boot .seal {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: #a8322e;
        color: #f5efe0;
        font-family: 'Noto Serif SC', 'STXingkai', '楷体', serif;
        font-size: 40px;
        line-height: 80px;
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(168, 50, 46, 0.3);
        font-weight: 500;
      }
      #cp-boot h1 {
        margin: 0 0 16px;
        font-family: 'Noto Serif SC', 'STXingkai', '楷体', serif;
        font-weight: 500;
        font-size: 40px;
        letter-spacing: 0.4em;
      }
      #cp-boot p {
        margin: 0 0 32px;
        color: #5a5a5a;
        max-width: 480px;
        font-size: 18px;
      }
      #cp-boot .spin {
        display: inline-flex;
        gap: 12px;
        align-items: center;
        padding: 12px 24px;
        background: #ebe3cf;
        border-radius: 999px;
        font-size: 16px;
        color: #5a5a5a;
      }
      #cp-boot .dot {
        width: 14px;
        height: 14px;
        border: 2px solid #c8b88a;
        border-top-color: #a8322e;
        border-radius: 50%;
        animation: cp-spin 0.8s linear infinite;
      }
      @keyframes cp-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="cp-boot">
      <div>
        <div class="seal">指</div>
        <h1 data-en="Compass" data-zh="指南">Compass</h1>
        <p
          data-en="A quiet compass for the inner self. Three minutes, three millennia."
          data-zh="一座心内之指南。三分钟，三千年。"
        >
          A quiet compass for the inner self. Three minutes, three millennia.
        </p>
        <div class="spin">
          <span class="dot"></span> <span data-en="Loading..." data-zh="拨针中…">Loading...</span>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var lang = (navigator.language || navigator.userLanguage || 'en').slice(0, 2);
        if (lang === 'zh') {
          var h1 = document.querySelector('#cp-boot h1');
          var p = document.querySelector('#cp-boot p');
          var spin = document.querySelector('#cp-boot .spin span');
          if (h1) h1.textContent = h1.getAttribute('data-zh');
          if (p) p.textContent = p.getAttribute('data-zh');
          if (spin) spin.textContent = spin.getAttribute('data-zh');
        }
      })();
    </script>
    <div id="root"></div>
    <div id="cp-overlays"></div>
    <noscript>
      <div
        style="
          max-width: 640px;
          margin: 80px auto;
          text-align: center;
          padding: 0 20px;
          font-family: serif;
        "
      >
        <h1>Compass needs JavaScript</h1>
        <p>
          Compass is a local-first, all-in-the-browser tool for self-discovery. Enable JavaScript to
          begin.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => {
            console.warn('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
