# =============================================================================
# Compass · Nginx 反向代理配置
# 挂载位置：/etc/nginx/conf.d/default.conf
# （nginx:alpine 基础镜像的 /etc/nginx/nginx.conf 已在 http 块内 include 该目录）
# =============================================================================

# ----- 80 端口：全部重定向到 HTTPS -----
server {
    listen 80;
    server_name your-domain.com;

    return 301 https://$host$request_uri;
}

# ----- 443 端口：HTTPS + HTTP/2 反向代理到 app:3000 -----
server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com;

    # SSL 证书（部署前请将证书放到 ./certs/ 下，参见文末 Let's Encrypt 说明）
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # 安全响应头
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;

        # 标准代理头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =============================================================================
# Let's Encrypt 证书替换说明：
#
# 1. 临时用 80 端口 + webroot 模式签发证书：
#      docker run --rm \
#        -v $(pwd)/certs:/etc/letsencrypt \
#        -v $(pwd)/certbot-www:/var/www/certbot \
#        certbot/certbot certonly --webroot -w /var/www/certbot \
#        -d your-domain.com --email you@example.com --agree-tos --no-eff-email
#
# 2. 将签发结果链接/复制到 ./certs/fullchain.pem 与 ./certs/privkey.pem：
#      ./certs/live/your-domain.com/fullchain.pem
#      ./certs/live/your-domain.com/privkey.pem
#
# 3. 续签：重跑步骤 1，完成后重载 nginx：
#      docker exec compass-nginx nginx -s reload
# =============================================================================
