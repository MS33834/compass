<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f5efe0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <meta property="og:title" content="MindMirror · 镜心" />
    <meta
      property="og:description"
      content="A mirror for asking thyself — maps your answers to historical figures across three thousand years."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>MindMirror · 镜心</title>
    <script>
      // SPA 路由兜底：仅对导航请求重定向到 index.html
      // 避免将 JS/CSS/图片等资源请求也重定向（会导致 MIME 不匹配）
      try {
        var l = window.location;
        var path = l.pathname;
        // 匹配 /MindMirror/ 或 /MindMirror/index.html 或 /MindMirror（无尾斜杠）
        var base = '/MindMirror';
        if (path === base || path === base + '/' || path === base + '/index.html') {
          // 已在首页，无需重定向
        } else if (path.indexOf(base + '/') === 0 && !path.match(/\.(js|css|svg|png|jpg|jpeg|gif|webp|ico|woff|woff2|ttf|eot|otf|json|xml|txt|map|webmanifest)$/i)) {
          // 仅对非资源请求重定向到 SPA
          l.replace(base + '/' + l.search + l.hash);
        } else {
          // 不匹配任何规则：3 秒后显示 404 提示，避免无限转圈
          setTimeout(function () {
            var boot = document.getElementById('jx-boot');
            if (boot) {
              boot.innerHTML =
                '<div><div class="seal">404</div><h1>Page Not Found</h1><p>The page you seek is not here.</p><a href="' +
                base +
                '/" style="display:inline-block;padding:12px 24px;background:#a8322e;color:#f5efe0;text-decoration:none;border-radius:4px;font-size:16px;">Return to Mirror</a></div>';
            }
          }, 3000);
        }
      } catch (e) {
        // 重定向失败时静默处理，避免白屏
      }
    </script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow-x: hidden;
        max-width: 100vw;
      }
      body {
        background: #f5efe0;
        color: #1a1a1a;
        font-family: '华文宋体', 'STSong', '宋体', 'SimSun', serif;
        font-size: 18px;
        line-height: 1.8;
        -webkit-font-smoothing: antialiased;
        text-align: center;
      }
      #jx-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        background: #f5efe0;
        transition: opacity 400ms ease;
      }
      #jx-boot .seal {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: #a8322e;
        color: #f5efe0;
        font-family: '华文行楷', 'STXingkai', '楷体', serif;
        font-size: 40px;
        line-height: 80px;
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(168, 50, 46, 0.3);
        font-weight: 500;
      }
      #jx-boot h1 {
        margin: 0 0 16px;
        font-family: '华文行楷', 'STXingkai', '楷体', serif;
        font-weight: 500;
        font-size: 40px;
        letter-spacing: 0.4em;
      }
      #jx-boot p {
        margin: 0 0 32px;
        color: #5a5a5a;
        max-width: 480px;
        font-size: 18px;
      }
      #jx-boot .spin {
        display: inline-flex;
        gap: 12px;
        align-items: center;
        padding: 12px 24px;
        background: #ebe3cf;
        border-radius: 999px;
        font-size: 16px;
        color: #5a5a5a;
      }
      #jx-boot .dot {
        width: 14px;
        height: 14px;
        border: 2px solid #c8b88a;
        border-top-color: #a8322e;
        border-radius: 50%;
        animation: jx-spin 0.8s linear infinite;
      }
      @keyframes jx-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="jx-boot">
      <div>
        <div class="seal">镜</div>
        <h1 data-en="Mirror" data-zh="镜心">Mirror</h1>
        <p data-en="A glass for asking thyself." data-zh="一面问己之镜。三分钟，三千年。">
          A glass for asking thyself.
        </p>
        <div class="spin">
          <span class="dot"></span> <span data-en="Loading…" data-zh="入镜中…">Loading…</span>
        </div>
      </div>
    </div>
    <script>
      (function () {
        // 检测浏览器语言偏好，显示对应的启动文案
        var lang = (navigator.language || navigator.userLanguage || 'en').slice(0, 2);
        if (lang === 'zh') {
          var h1 = document.querySelector('#jx-boot h1');
          var p = document.querySelector('#jx-boot p');
          var spin = document.querySelector('#jx-boot .spin span');
          if (h1) h1.textContent = h1.getAttribute('data-zh');
          if (p) p.textContent = p.getAttribute('data-zh');
          if (spin) spin.textContent = spin.getAttribute('data-zh');
        }
      })();
    </script>
    <div id="root"></div>
    <noscript>
      <div
        style="
          max-width: 640px;
          margin: 80px auto;
          text-align: center;
          padding: 0 20px;
          font-family: serif;
        "
      >
        <h1 data-en="Mirror requires JavaScript" data-zh="镜心 需 JavaScript 方可入镜">
          Mirror requires JavaScript
        </h1>
        <p
          data-en="Mirror is a pure-frontend glass for asking thyself. Please enable JavaScript and look again."
          data-zh="镜心 是一面纯前端的问己之镜。请开启 JavaScript，再来照一照。"
        >
          Mirror is a pure-frontend glass for asking thyself. Please enable JavaScript and look
          again.
        </p>
      </div>
    </noscript>
  </body>
</html>
