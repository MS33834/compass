<?xml version="1.0" encoding="UTF-8"?>
<!-- 镜心 · 宣纸底纹 · 240×240 可平铺 -->
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <filter id="fiber" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="11" />
      <feColorMatrix values="0 0 0 0 0.45
                             0 0 0 0 0.36
                             0 0 0 0 0.22
                             0 0 0 0.18 0"/>
    </filter>
    <filter id="stain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="7" />
      <feColorMatrix values="0 0 0 0 0.66
                             0 0 0 0 0.55
                             0 0 0 0 0.35
                             0 0 0 0.08 0"/>
    </filter>
  </defs>
  <rect width="240" height="240" fill="#f5efe0"/>
  <rect width="240" height="240" filter="url(#stain)"/>
  <rect width="240" height="240" filter="url(#fiber)"/>
</svg>
